# Issue #9 — opt-in Docker Secrets overlay.
#
# Usage on the deploy host (file-based secrets, single-host compose;
# no Swarm required):
#
#   mkdir -p secrets && chmod 700 secrets
#   printf '%s' "your-jwt-secret"      > secrets/jwt_secret
#   printf '%s' "your-gemini-key"      > secrets/gemini_api_key
#   printf '%s' "your-google-id"       > secrets/google_client_id
#   printf '%s' "your-google-secret"   > secrets/google_client_secret
#   printf '%s' "you@gmail.com"        > secrets/smtp_user      # optional
#   printf '%s' "your-smtp-app-pass"   > secrets/smtp_pass      # optional
#   chmod 600 secrets/*
#
#   docker compose -f docker-compose.yaml -f docker-compose.secrets.yaml up -d
#
# The server reads each secret via server/utils/loadSecret.js, which
# prefers /run/secrets/<name> over the corresponding env var.  This
# overlay does NOT remove the env-var lines from the base compose so
# local-dev workflows that only have a `.env` keep working.
#
# secrets/ is in .gitignore — never commit it.

services:
  server:
    secrets:
      - jwt_secret
      - gemini_api_key
      - google_client_id
      - google_client_secret
      - smtp_user
      - smtp_pass
      - smtp_from

secrets:
  jwt_secret:
    file: ./secrets/jwt_secret
  gemini_api_key:
    file: ./secrets/gemini_api_key
  google_client_id:
    file: ./secrets/google_client_id
  google_client_secret:
    file: ./secrets/google_client_secret
  smtp_user:
    file: ./secrets/smtp_user
  smtp_pass:
    file: ./secrets/smtp_pass
  smtp_from:
    file: ./secrets/smtp_from
