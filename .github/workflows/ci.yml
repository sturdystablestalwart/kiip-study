name: CI

on:
  pull_request:
    branches: [main]

# Cancel superseded CI runs on the same PR — rapid pushes (or
# force-pushes) shouldn't burn runner minutes verifying stale commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: the CI workflow only reads the checked-out tree and
# uploads an artifact (which uses run-scoped permissions, not API tokens).
# No write access to contents, issues, PRs, or packages is required.
permissions:
  contents: read

jobs:
  # Fast-path: lint / build / vitest don't need a Mongo or Playwright,
  # so we split them off so the slow E2E shards aren't gated on them
  # serially (they're gated as `needs:` instead).
  lint-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      # Issue #192 — install three workspaces in parallel. setup-node's
      # `cache: npm` warms ~/.npm so the slow part is hard-link extraction,
      # which parallelizes well on the 2-core runner.
      - name: Install all workspaces in parallel
        run: |
          npm ci & pid1=$!
          (cd client && npm ci) & pid2=$!
          (cd server && npm ci) & pid3=$!
          wait $pid1 && wait $pid2 && wait $pid3

      - name: Lint client
        run: cd client && npm run lint

      - name: i18n coverage check (#34)
        run: cd client && npm run i18n:check

      - name: Build client
        run: cd client && npm run build

      # Issue #14 — gate PRs on vitest too, not just lint+build+E2E.
      # Server tests use mongodb-memory-server; client uses jsdom; neither
      # needs the live Mongo / Express used by the E2E shards.
      - name: Test client (vitest)
        run: cd client && npm test
        env:
          NODE_ENV: test

      - name: Test server (vitest)
        run: cd server && npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-used-in-production-xx

      # Issue #53 — vitest coverage on both workspaces, threshold-gated
      # in {client,server}/vitest.config.js.  continue-on-error so a
      # missing @vitest/coverage-v8 doesn't fail the build.
      - name: Coverage — client
        continue-on-error: true
        run: cd client && npm run test:coverage
      - name: Coverage — server
        continue-on-error: true
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-secret-not-used-in-production-xx
        run: cd server && npm run test:coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage-reports
          path: |
            client/coverage/
            server/coverage/
          retention-days: 7

  # Issue #192 — split E2E across 3 shards so wall-clock drops from
  # ~10min to ~4min.  Each shard provisions its own Mongo + Playwright
  # browser; the matrix elements run in parallel so total runner time
  # goes up but the gate-time the contributor waits on drops.
  e2e:
    needs: lint-build-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json

      - name: Install all workspaces in parallel
        run: |
          npm ci & pid1=$!
          (cd client && npm ci) & pid2=$!
          (cd server && npm ci) & pid3=$!
          wait $pid1 && wait $pid2 && wait $pid3

      - name: Build client
        run: cd client && npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@65edc22f4b7334080451e277dd338d2732982d8f # 1.11.0
        with:
          mongodb-version: "7.0"

      # Issue #55 — Playwright owns the dev-server lifecycle via the
      # `webServer` block in playwright.config.js; no manual wait-on
      # here.  --shard splits the 122-test suite across 3 jobs.
      - name: Run Playwright tests (shard ${{ matrix.shard }}/3)
        run: npx playwright test --project=chromium --shard=${{ matrix.shard }}/3
        env:
          CI: true
          BASE_URL: http://localhost:5173
          NODE_ENV: test
          MONGO_URI: mongodb://localhost:27017/kiip_test_app
          GEMINI_API_KEY: test_key_not_used_in_ci
          JWT_SECRET: ci-test-secret-not-used-in-production-xx
          GOOGLE_CLIENT_ID: ci-google-client-id-placeholder
          GOOGLE_CLIENT_SECRET: ci-google-client-secret-placeholder
          CLIENT_URL: http://localhost:5173
          ADMIN_EMAIL: admin@example.com

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 7
