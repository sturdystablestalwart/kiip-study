name: Deploy

# Production deploys are gated on signed annotated tags (refs/tags/v*).
# A push to main alone CANNOT trigger a deploy — a maintainer must create
# and push a GPG-signed tag, which the deploy host then verifies with
# `git verify-tag` before checking out the exact tagged commit.
# Manual escape hatch: workflow_dispatch with an explicit commit SHA.
# See README "Release & deploy" for the operator runbook.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to deploy (overrides tag flow; use sparingly)'
        required: false

# Serialize deploys by commit SHA — duplicate runs for the same revision
# are pointless, but we deliberately do NOT set cancel-in-progress so an
# in-flight production deploy is never interrupted mid-rollout.
concurrency:
  group: deploy-${{ github.event.inputs.sha || github.ref }}
  cancel-in-progress: false

# Least-privilege: the deploy job SSHes to a remote host. It does not
# call the GitHub API and never needs write access to repo contents,
# issues, or PRs.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy to home server
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1
        env:
          INPUT_SHA: ${{ inputs.sha }}
          GITHUB_REF: ${{ github.ref }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: INPUT_SHA,GITHUB_REF
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"

            # Fetch all tags so we can verify signatures and check out by tag/SHA.
            git fetch --tags --force origin

            if [ -n "${INPUT_SHA:-}" ]; then
              # Manual dispatch path: deploy the exact SHA the operator supplied.
              # Trust comes from GitHub repo permissions on workflow_dispatch.
              echo "Manual dispatch: deploying SHA ${INPUT_SHA}"
              git fetch origin "${INPUT_SHA}"
              git checkout --detach "${INPUT_SHA}"
            else
              # Tag-push path: extract refs/tags/<TAG>, require a valid GPG
              # signature on the annotated tag, then check out the tag's commit.
              TAG="${GITHUB_REF#refs/tags/}"
              echo "Tag push: verifying signature on ${TAG}"
              if ! git verify-tag "${TAG}"; then
                echo "ERROR: tag signature invalid or missing for ${TAG}" >&2
                exit 1
              fi
              git checkout --detach "refs/tags/${TAG}"
            fi

            echo "Deploying commit: $(git rev-parse HEAD)"

            # Issue #18 — blue/green-lite rollback.  Before we replace
            # the running containers, snapshot their current images as
            # *-rollback tags so we can re-tag them as latest if the
            # health probe fails.  No registry required.
            for svc in kiip-server kiip-client; do
              current_image=$(docker inspect --format='{{.Config.Image}}' "$svc" 2>/dev/null || true)
              if [ -n "$current_image" ]; then
                docker tag "$current_image" "${svc}:rollback" || true
              fi
            done

            # Issue #471 — pre-deploy mongodump so a destructive code
            # path during this deploy is recoverable. Image rollback
            # (above) restores the OLD containers but cannot undo
            # writes to the persistent mongo_data volume. Keeps the
            # last 5 pre-deploy snapshots alongside the daily backup
            # container output.
            DEPLOY_SHA=$(git rev-parse --short HEAD)
            SNAP="/data/db/pre-deploy-${DEPLOY_SHA}.archive"
            HOST_BACKUP_DIR="${DEPLOY_PATH}/backups"
            mkdir -p "$HOST_BACKUP_DIR"
            if docker ps --format '{{.Names}}' | grep -q '^kiip-mongo$'; then
              echo "Snapshotting mongo to pre-deploy-${DEPLOY_SHA}.archive.gz"
              # Auth-aware (#465). Source the running container's env
              # so the script doesn't have to know the credentials.
              MONGO_USER=$(docker exec kiip-mongo printenv MONGO_INITDB_ROOT_USERNAME)
              MONGO_PASS=$(docker exec kiip-mongo printenv MONGO_INITDB_ROOT_PASSWORD)
              docker exec kiip-mongo mongodump \
                --uri="mongodb://${MONGO_USER}:${MONGO_PASS}@localhost:27017/kiip_test_app?authSource=admin" \
                --archive="$SNAP" --gzip || {
                  echo "WARNING: pre-deploy mongodump failed; proceeding anyway"
                }
              if docker exec kiip-mongo test -f "$SNAP"; then
                docker cp "kiip-mongo:${SNAP}" "${HOST_BACKUP_DIR}/pre-deploy-${DEPLOY_SHA}.archive.gz"
                docker exec kiip-mongo rm -f "$SNAP"
                # Retain only the 5 most-recent pre-deploy snapshots.
                ls -1t "${HOST_BACKUP_DIR}"/pre-deploy-*.archive.gz 2>/dev/null | tail -n +6 | xargs -r rm -f
              fi
            else
              echo "No running kiip-mongo container — skipping pre-deploy snapshot (first deploy)."
            fi

            # Issue #191 — explicitly enable BuildKit + compose CLI build
            # so docker-compose `cache_from` + BUILDKIT_INLINE_CACHE=1 args
            # actually populate / consume layer cache from the previously
            # built local image.  Default-on for Docker 23+ but pinning
            # here makes the deploy host-version-independent.
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            docker compose build
            docker compose up -d

            for i in $(seq 1 30); do
              if curl -sf http://localhost:80/health; then
                echo "Deploy successful"
                exit 0
              fi
              sleep 5
            done

            echo "Health check failed after 150s — rolling back"
            # If we snapshotted images, re-tag them as the names compose
            # would build to and bounce containers.  Compose still has
            # the up-to-date images cached locally; pulling isn't needed.
            for svc in kiip-server kiip-client; do
              if docker image inspect "${svc}:rollback" >/dev/null 2>&1; then
                docker tag "${svc}:rollback" "${svc}:latest" || true
              fi
            done
            docker compose up -d

            # Give the rolled-back stack a moment then verify.
            sleep 10
            if curl -sf http://localhost:80/health; then
              echo "Rollback restored a healthy deploy" && exit 1   # exit 1 so CI run shows failed deploy
            fi
            echo "ROLLBACK ALSO UNHEALTHY — manual intervention required" && exit 2
