# Weekly dependency-update PRs (issue #29).
#
# Three npm workspaces (root, client, server) plus GitHub Actions and
# Docker base images.  Minor/patch dev-dep bumps are grouped per
# workspace so we don't drown in PR noise; majors stay individual so
# they get human eyes.
#
# Sequencing note: only safe to auto-merge once CI runs vitest (#14)
# AND builds Docker images (#123) on every PR.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dev-deps:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"

  - package-ecosystem: "docker"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"

  - package-ecosystem: "docker"
    directory: "/client"
    schedule:
      interval: "weekly"
      day: "monday"
