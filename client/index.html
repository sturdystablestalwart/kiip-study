<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>KIIP Study — Korea Immigration Integration Program practice</title>
    <meta name="description" content="Desktop-first practice test platform for the Korea Immigration and Integration Program (KIIP) Level 0-5 exam. Curriculum-classified test library, endless practice mode, 4-language UI." />

    <!-- iOS Safari status bar / PWA chrome — light + dark via media query.
         Matches theme.colors.bg.app (#F7F2E8 light / #1A1A1A dark). -->
    <meta name="theme-color" content="#F7F2E8" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1A1A1A" media="(prefers-color-scheme: dark)" />

    <!-- OpenGraph for link previews in Slack/Messenger/Discord/etc. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="KIIP Study" />
    <meta property="og:description" content="Desktop-first practice test platform for the Korea Immigration and Integration Program (KIIP) exam." />
    <meta property="og:image" content="/icon-192.svg" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="KIIP Study" />
    <meta name="twitter:description" content="Desktop-first KIIP exam practice platform." />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Issue #180 — non-blocking font load: preload as style, swap to
         stylesheet on load.  Falls back to the system stack from
         theme.tokens.typography.body until the webfont arrives, so
         FCP isn't blocked by the third-party request.  <noscript>
         block keeps SEO crawlers + no-JS clients on the original
         render-blocking path.
         Issue #481 — preload→swap moved to utils/fontPreloader.js
         (loaded via the existing bundled <script type="module">) so
         the inline onload="..." handler doesn't violate
         `script-src 'self'` once the SPA shell ships CSP (#467).
         The element IDs let the JS find the preload links unambiguously. -->
    <link rel="preload" as="style" id="kiip-font-noto"
          href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap">
    <link rel="preload" as="style" id="kiip-font-inter"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;650;700&family=BIZ+UDPGothic:wght@400;700&display=swap">
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;650;700&family=BIZ+UDPGothic:wght@400;700&display=swap" rel="stylesheet">
    </noscript>
  </head>
  <body>
    <noscript>This app requires JavaScript. Please enable it in your browser to continue.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
