services:
  mongo:
    # SHA-pinned (#51) so `docker compose pull` is reproducible across redeploys.
    image: mongo:7@sha256:4b5bf3c2bb7516164f6dcb44acce4fdcb428abfe5771a1128304a0f34ab9ff7c
    container_name: kiip-mongo
    restart: unless-stopped
    init: true
    volumes:
      - mongo_data:/data/db
    networks:
      - kiip-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    mem_limit: 1g
    cpus: '1.0'

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: kiip-server
    restart: unless-stopped
    init: true
    expose:
      - "5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/kiip_test_app
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - CLIENT_URL=${CLIENT_URL}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
    volumes:
      - server_uploads:/app/uploads
      - ./additionalContext/tests:/additionalContext/tests:ro
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - kiip-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    read_only: true
    tmpfs:
      - /tmp
      # Issue #195 — uploads/temp holds short-lived multer staging and
      # bulk-import preview JSON.  Putting it on tmpfs (mounted *over*
      # the persistent server_uploads volume at that subpath) keeps it
      # ephemeral so a crashed container doesn't leave stale preview
      # blobs on the persistent volume.  Size capped to 200MB matching
      # the largest realistic bulk-import file.
      - /app/uploads/temp:size=200m,mode=750,uid=1000,gid=1000
    mem_limit: 512m
    cpus: '1.0'

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: kiip-client
    restart: unless-stopped
    init: true
    expose:
      - "8080"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - kiip-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    mem_limit: 128m
    cpus: '0.5'

  caddy:
    # SHA-pinned (#51).
    image: caddy:2-alpine@sha256:86deaf5e3d3408a6ccec08fbb79989783dd26e206ae10bcf78a801dc8c9ab794
    container_name: kiip-caddy
    restart: unless-stopped
    init: true
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_HOST=${CADDY_HOST:-localhost}
      - CADDY_EMAIL=${CADDY_EMAIL:-admin@example.com}
    depends_on:
      - client
      - server
    networks:
      - kiip-network
    healthcheck:
      # End-to-end probe: bind on :80 + Caddyfile parse + reverse_proxy →
      # server + /health handler. Hits the same path the deploy workflow
      # uses, so a proxy regression can't pass `service_healthy` while
      # real traffic breaks (issue #94).
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 128m
    cpus: '0.25'

  backup:
    # SHA-pinned (#51) to the same mongo:7 digest used by the mongo service.
    image: mongo:7@sha256:4b5bf3c2bb7516164f6dcb44acce4fdcb428abfe5771a1128304a0f34ab9ff7c
    container_name: kiip-backup
    init: true
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo:27017/kiip_test_app
    volumes:
      - ./ops/backup.sh:/usr/local/bin/backup.sh:ro
      - ./backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "while true; do sleep 86400; /usr/local/bin/backup.sh; done"
    restart: unless-stopped
    networks:
      - kiip-network
    healthcheck:
      # Confirms the mounted backup.sh script is present + executable.
      # A silent volume-mount failure would otherwise leave this container
      # cron-spinning forever with no backups landing.
      test: ["CMD", "test", "-x", "/usr/local/bin/backup.sh"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    cpus: '0.5'

volumes:
  mongo_data:
    driver: local
  server_uploads:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  kiip-network:
    driver: bridge
