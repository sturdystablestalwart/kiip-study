# Issue #466 — cap json-file log size per service so a chatty container
# (morgan access logs at 200 req/min over months → multi-GB) can't fill
# the host disk. 10MB × 3 rotated files × compressed ≈ ~10MB on disk per
# service at worst.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"
    compress: "true"

services:
  mongo:
    # SHA-pinned (#51) so `docker compose pull` is reproducible across redeploys.
    image: mongo:7@sha256:4b5bf3c2bb7516164f6dcb44acce4fdcb428abfe5771a1128304a0f34ab9ff7c
    container_name: kiip-mongo
    restart: unless-stopped
    init: true
    logging: *default-logging
    # Issue #465 — enable mongo auth so a compromised sibling container
    # (sharp libpng RCE, pdf-parse RCE, caddy module RCE, ...) can't
    # pivot to the database. Root credentials are stamped on FIRST boot
    # of an empty mongo_data volume; for existing volumes operators
    # must add the user manually (see .env.example).
    command: ["mongod", "--auth", "--bind_ip_all"]
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:?MONGO_ROOT_USERNAME is required}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
    volumes:
      - mongo_data:/data/db
    networks:
      - kiip-network
    healthcheck:
      # Auth-aware ping using the root creds the container was initialised with.
      test: ["CMD-SHELL", "mongosh -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --quiet --eval \"db.adminCommand('ping')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    mem_limit: 1g
    cpus: '1.0'

  server:
    # Issue #191 — deploy host has no registry, but local Docker keeps
    # the previous build.  `cache_from` + inline cache lets BuildKit
    # reuse layers from the previously-built local image so a one-line
    # change doesn't re-run `npm ci` from scratch.
    image: kiip-server:latest
    build:
      context: ./server
      dockerfile: Dockerfile
      cache_from:
        - kiip-server:latest
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: kiip-server
    restart: unless-stopped
    init: true
    logging: *default-logging
    expose:
      - "5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      # Issue #465 — auth-aware URI. authSource=admin because the user
      # was created on the admin DB by MONGO_INITDB_ROOT_USERNAME/PASSWORD.
      - MONGO_URI=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/kiip_test_app?authSource=admin
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - CLIENT_URL=${CLIENT_URL}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
    volumes:
      - server_uploads:/app/uploads
      - ./additionalContext/tests:/additionalContext/tests:ro
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - kiip-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      # Issue #124 — entrypoint script mkdirs + chmods uploads dirs
      # before node starts.  Cold-volume boots take a bit longer than
      # warm starts; 30s leaves headroom over the 15s startup target.
      start_period: 30s
    read_only: true
    tmpfs:
      - /tmp
      # Issue #195 — uploads/temp holds short-lived multer staging and
      # bulk-import preview JSON.  Putting it on tmpfs (mounted *over*
      # the persistent server_uploads volume at that subpath) keeps it
      # ephemeral so a crashed container doesn't leave stale preview
      # blobs on the persistent volume.  Size capped to 200MB matching
      # the largest realistic bulk-import file.
      - /app/uploads/temp:size=200m,mode=750,uid=1000,gid=1000
    mem_limit: 512m
    cpus: '1.0'

  client:
    # Issue #191 — see `server` block for cache_from rationale.
    image: kiip-client:latest
    build:
      context: ./client
      dockerfile: Dockerfile
      cache_from:
        - kiip-client:latest
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: kiip-client
    restart: unless-stopped
    init: true
    logging: *default-logging
    expose:
      - "8080"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - kiip-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    mem_limit: 128m
    cpus: '0.5'

  caddy:
    # Issue #52 — custom Caddy build that bundles caddy-ratelimit so
    # the Caddyfile can use the `rate_limit` directive for L7 edge
    # throttling.  See ops/caddy/Dockerfile.  Base + builder are both
    # SHA-pinned (#51).
    image: kiip-caddy:latest
    build:
      context: ./ops/caddy
      dockerfile: Dockerfile
      cache_from:
        - kiip-caddy:latest
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: kiip-caddy
    restart: unless-stopped
    init: true
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - CADDY_HOST=${CADDY_HOST:-localhost}
      - CADDY_EMAIL=${CADDY_EMAIL:-admin@example.com}
    depends_on:
      - client
      - server
    networks:
      - kiip-network
    healthcheck:
      # End-to-end probe: bind on :80 + Caddyfile parse + reverse_proxy →
      # server + /health handler. Hits the same path the deploy workflow
      # uses, so a proxy regression can't pass `service_healthy` while
      # real traffic breaks (issue #94).
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    mem_limit: 128m
    cpus: '0.25'

  backup:
    # Issue #201 — purpose-built ~88MB alpine + mongodb-tools image
    # instead of the full ~700MB `mongo:7`.  Backup only needs
    # mongodump + tar/gzip, no mongod/mongosh.  Dockerfile lives in
    # ops/backup/ and is built locally — no registry push needed.
    image: kiip-backup:latest
    build:
      context: ./ops/backup
      dockerfile: Dockerfile
      cache_from:
        - kiip-backup:latest
      args:
        BUILDKIT_INLINE_CACHE: "1"
    container_name: kiip-backup
    init: true
    logging: *default-logging
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      # Issue #465 — auth-aware URI; see server block above.
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/kiip_test_app?authSource=admin
    volumes:
      - ./ops/backup.sh:/usr/local/bin/backup.sh:ro
      - ./backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    # Issue #202 — invert the loop so the FIRST backup runs immediately
    # on container start (no 24h gap on a fresh deploy) and a container
    # that crashes-and-restarts daily before the sleep completes still
    # produces backups.  Also guards backup.sh failure so an upstream
    # mongodump error doesn't crash the loop.
    command: >
      "while true; do /usr/local/bin/backup.sh || echo 'backup failed, will retry in 24h'; sleep 86400; done"
    restart: unless-stopped
    networks:
      - kiip-network
    healthcheck:
      # Confirms the mounted backup.sh script is present + executable.
      # A silent volume-mount failure would otherwise leave this container
      # cron-spinning forever with no backups landing.
      test: ["CMD", "test", "-x", "/usr/local/bin/backup.sh"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
    mem_limit: 256m
    cpus: '0.5'

volumes:
  mongo_data:
    driver: local
  server_uploads:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local

networks:
  kiip-network:
    driver: bridge
